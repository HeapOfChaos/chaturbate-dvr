name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build and release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          mkdir -p dist

          GOOS=linux   GOARCH=amd64  go build -ldflags="-s -w" -o dist/linux_amd64_chaturbate-dvr .
          GOOS=windows GOARCH=amd64  go build -ldflags="-s -w" -o dist/windows_amd64_chaturbate-dvr.exe .
          GOOS=darwin  GOARCH=amd64  go build -ldflags="-s -w" -o dist/darwin_amd64_chaturbate-dvr .
          GOOS=darwin  GOARCH=arm64  go build -ldflags="-s -w" -o dist/darwin_arm64_chaturbate-dvr .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
